  decisions:
    - keep one main AgenticOS product repository and one canonical standards area inside it
    - merge durable standards knowledge into the main repo, but archive raw standalone context/history instead of treating it as live state
    - keep the archive read-only and use it only for provenance or later selective recovery
    - preserve the live .context/.last_record marker because current tooling still uses it
    - no second broad merge wave is needed for the retired standalone standards repo
    - standard-kit v1 should ship adopt plus upgrade-check before any destructive copied-template upgrade flow
    - status surfaces should prefer compact human-readable guardrail summaries over raw persisted JSON blobs
    - switch should reuse the same compact guardrail-summary formatter as status instead of maintaining a second formatting path
    - backlog cleanup should prefer closing or rewriting historical issues over leaving architecture-era ambiguity in the open queue
    - the local canonical checkout should be kept clean and used only as the trusted base, with implementation work moving to isolated issue worktrees
    - agenticos_record should normalize JSON-stringified array inputs at the tool boundary rather than expecting every MCP caller to submit native arrays
    - agenticos_switch should treat its return string as a first-class mid-conversation handoff surface instead of only listing context file paths
    - project-boundary enforcement should centralize identity proof in one shared resolver rather than duplicate weaker checks in record/save/context
    - memory-layer enforcement should start by freezing canonical contracts in standards and templates before attempting broader runtime linting
    - sub-agent inheritance should land first as a standard-kit-backed protocol and template contract before any deeper runtime automation
    - per-agent bootstrap should land as one canonical matrix plus aligned docs, while Homebrew caveats and fallback-mode strategy remain separate follow-up issues
