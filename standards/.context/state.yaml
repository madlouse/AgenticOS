  decisions:
    - keep one main AgenticOS product repository and one canonical standards
      area inside it
    - merge durable standards knowledge into the main repo, but archive raw
      standalone context/history instead of treating it as live state
    - keep the archive read-only and use it only for provenance or later
      selective recovery
    - preserve the live .context/.last_record marker because current tooling
      still uses it
    - no second broad merge wave is needed for the retired standalone standards
      repo
    - standard-kit v1 should ship adopt plus upgrade-check before any
      destructive copied-template upgrade flow
    - status surfaces should prefer compact human-readable guardrail summaries
      over raw persisted JSON blobs
    - switch should reuse the same compact guardrail-summary formatter as status
      instead of maintaining a second formatting path
    - backlog cleanup should prefer closing or rewriting historical issues over
      leaving architecture-era ambiguity in the open queue
    - the local canonical checkout should be kept clean and used only as the
      trusted base, with implementation work moving to isolated issue worktrees
    - agenticos_record should normalize JSON-stringified array inputs at the
      tool boundary rather than expecting every MCP caller to submit native
      arrays
    - agenticos_switch should treat its return string as a first-class
      mid-conversation handoff surface instead of only listing context file
      paths
    - project-boundary enforcement should centralize identity proof in one
      shared resolver rather than duplicate weaker checks in record/save/context
    - memory-layer enforcement should start by freezing canonical contracts in
      standards and templates before attempting broader runtime linting
    - sub-agent inheritance should land first as a standard-kit-backed protocol
      and template contract before any deeper runtime automation
    - per-agent bootstrap should land as one canonical matrix plus aligned docs,
      while Homebrew caveats and fallback-mode strategy remain separate
      follow-up issues
    - Homebrew post-install should remain reminder-only until an explicit opt-in
      bootstrap helper exists
    - fallback integration modes must be documented as narrower than MCP-native,
      not as equal parallel runtime modes
    - strict coverage follow-up issues should add the smallest fallback-path
      regression tests needed to prove the existing design rather than reopening
      already-correct runtime behavior
    - canonical local sync should be treated as a repeatable contract with
      executable verification, not as an occasional operator cleanup task
    - entry-surface refresh should be deterministic and bounded, not an
      unconstrained summarizer over arbitrary merged documents
    - health should be a compact pre-work gate with high-signal PASS/WARN/BLOCK
      semantics, not a broad dashboard
    - non-code evaluation should be a deterministic validator and persistence
      surface around the canonical rubric, not an embedded opaque scoring system
    - self-hosting and product-source cleanup must not remove preserved sibling
      projects or legacy operator paths unless each removal is explicitly
      intended and recoverable
    - recovery claims for missing projects must distinguish exact Git
      restoration from reconstruction from verified local sources
    - when evidence is sufficient for one missing project but not another,
      restore only the honest subset and leave the remaining gap explicit
    - when the strongest verified content source is external to the repo, prefer
      an external-source wrapper project over a false claim of full in-repo
      restoration
    - `AGENTICOS_HOME` should be described as the workspace home, while
      `projects/<id>` remains the project-source boundary for source-managed
      projects
    - `/opt/homebrew/var/agenticos` is a valid Homebrew example workspace path,
      not the normative target when a self-hosting machine already uses
      /Users/jeking/dev/AgenticOS as its workspace home
