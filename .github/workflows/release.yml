name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  FORMULA_PATH: Formula/agenticos.rb
  HOMEBREW_TAP: madlouse/homebrew-agenticos

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify Homebrew tap PAT
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          if [ -z "${HOMEBREW_TAP_PAT:-}" ]; then
            {
              echo "## Release blocked: HOMEBREW_TAP_PAT is not configured"
              echo
              echo "The release workflow fails before building or publishing a GitHub Release because the Homebrew tap cannot be bumped automatically."
              echo
              echo "Operator checklist:"
              echo "1. Create a fine-grained PAT scoped to ${{ env.HOMEBREW_TAP }} with Contents: read/write and Metadata: read, or a classic PAT with equivalent repository write access."
              echo "2. Save it as the AgenticOS repository secret HOMEBREW_TAP_PAT under Settings -> Secrets and variables -> Actions."
              echo "3. Verify the secret exists with: gh secret list --repo madlouse/AgenticOS | grep -E '^HOMEBREW_TAP_PAT[[:space:]]'"
              echo "4. Re-run this tag workflow or push the next release tag."
              echo
              echo "Do not paste the PAT into issue comments, PRs, logs, or chat."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing HOMEBREW_TAP_PAT::Configure the repository secret before tagging a release so ${{ env.HOMEBREW_TAP }} can be bumped automatically. See standards/.context/release-process.md."
            exit 1
          fi

          echo "HOMEBREW_TAP_PAT is configured; automated Homebrew tap bump is eligible."

  build-and-release:
    needs: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history for npm version to work properly
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Update package.json version
        working-directory: mcp-server
        run: |
          CURRENT=$(grep '"version"' package.json | cut -d'"' -f4)
          echo "Current version: $CURRENT, Target: $VERSION"
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
            echo "Updated package.json to $VERSION"
          else
            echo "Version already $VERSION, no update needed"
          fi
          grep '"version"' package.json

      - name: Install and build
        working-directory: mcp-server
        run: |
          npm install
          npm run build

      - name: Create npm tarball
        working-directory: mcp-server
        run: npm pack

      - name: Move tarball to root
        run: mv mcp-server/agenticos-mcp-*.tgz ./agenticos-mcp.tgz

      - name: Verify tarball exists
        run: |
          if [ ! -f ./agenticos-mcp.tgz ]; then
            echo "ERROR: tarball not found"
            exit 1
          fi
          echo "Tarball: $(du -sh agenticos-mcp.tgz)"

      - name: Verify tarball version
        run: |
          echo "Checking version in tarball..."
          tar -tzf agenticos-mcp.tgz | xargs grep '"version"' | head -1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: agenticos-mcp.tgz
          generate_release_notes: true

  bump-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Download release artifact
        run: |
          curl -sL -o agenticos-mcp.tgz \
            "https://github.com/madlouse/AgenticOS/releases/download/${{ github.ref_name }}/agenticos-mcp.tgz"

      - name: Verify Homebrew tap PAT
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          if [ -z "${HOMEBREW_TAP_PAT:-}" ]; then
            echo "::error title=Missing HOMEBREW_TAP_PAT::Release preflight should have blocked this run. Configure the repository secret before publishing releases."
            exit 1
          fi
          echo "HOMEBREW_TAP_PAT is configured for the tap update step."

      - name: Update Homebrew formula in tap repo
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          # Direct clone+sed+push to the tap repo. Replaces
          # mislav/bump-homebrew-formula-action, which failed with "unexpected HTTP 303"
          # (download phase) and defaults to fork+PR rather than a hands-off direct commit.
          # Same sed contract as the "Sync formula to source repo" step below. See #608.
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 agenticos-mcp.tgz | cut -d' ' -f1)

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/${{ env.HOMEBREW_TAP }}.git" tap-repo

          sed -E -i.bak \
            -e "s|releases/download/v[^/]*/agenticos-mcp(-[^/\"]*)?\.tgz|releases/download/v${VERSION}/agenticos-mcp.tgz|" \
            -e "s|version \"[0-9.]*\"|version \"${VERSION}\"|" \
            -e "s| sha256 \"[a-f0-9]*\"| sha256 \"${SHA}\"|" \
            "tap-repo/${{ env.FORMULA_PATH }}"
          rm "tap-repo/${{ env.FORMULA_PATH }}.bak"

          cd tap-repo
          if git diff --quiet; then
            echo "Tap formula already at v${VERSION}; nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.FORMULA_PATH }}"
          git commit -m "agenticos ${VERSION}"
          git push origin HEAD

      - name: Sync formula to source repo
        run: |
          # After the tap repo is bumped above, sync the version back to source
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 agenticos-mcp.tgz | cut -d' ' -f1)
          # Update URL to match the actual release asset name (no version in filename)
          sed -E -i.bak \
            -e "s|releases/download/v[^/]*/agenticos-mcp(-[^/\"]*)?\.tgz|releases/download/v${VERSION}/agenticos-mcp.tgz|" \
            -e "s|version \"[0-9.]*\"|version \"${VERSION}\"|" \
            -e "s| sha256 \"[a-f0-9]*\"| sha256 \"${SHA}\"|" \
            homebrew-tap/Formula/agenticos.rb
          rm homebrew-tap/Formula/agenticos.rb.bak

          if git diff --quiet -- homebrew-tap/Formula/agenticos.rb; then
            echo "Source formula already synced to v${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add homebrew-tap/Formula/agenticos.rb
          git commit -m "chore: sync formula to v${VERSION} [skip ci]"
          git push origin HEAD:main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on Homebrew update failure
        if: failure()
        run: |
          echo "Homebrew formula update failed for ${{ github.ref_name }}"
          echo "Manual intervention required in ${{ env.HOMEBREW_TAP }} repository"
