name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
        working-directory: projects/agenticos/mcp-server
      - name: TypeScript type check
        run: npm run lint
        working-directory: projects/agenticos/mcp-server
      - name: Build
        run: npm run build
        working-directory: projects/agenticos/mcp-server
      - name: Run tests
        run: npm test
        working-directory: projects/agenticos/mcp-server
