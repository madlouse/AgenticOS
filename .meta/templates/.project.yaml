meta:
  name: "Project Name"
  id: "project-id"
  version: "1.0.0"
  created: "YYYY-MM-DD"
  description: "Project description"

source_control:
  topology: "local_directory_only"  # local_directory_only for local work/knowledge; git_versioned for GitHub/GitLab/Gitee/generic Git projects
  context_publication_policy: "local_private"  # local_private for local_directory_only; private_continuity or public_distilled for git_versioned
  # repository:                    # Required when topology is git_versioned
  #   provider: "github"           # github/gitlab/gitee/generic
  #   remote: "origin"
  #   slug: "OWNER/REPO"           # Optional only for provider=generic
  #   default_base_branch: "origin/main"
  #   review_system: "pull_request" # pull_request/merge_request/none
  # branch_strategy: "issue_branch_review_merge"
  # github_repo: "OWNER/REPO"      # Legacy compatibility only when topology is github_versioned
  # branch_strategy: "github_flow" # Legacy compatibility alias for github_versioned projects

agent_context:
  quick_start: ".context/quick-start.md"
  current_state: ".context/state.yaml"
  conversations: ".context/conversations/"  # configured conversation-history contract path; raw transcript routing may still differ by publication policy
  knowledge: "knowledge/"
  tasks: "tasks/"
  artifacts: "artifacts/"

memory_contract:
  version: 1
  quick_start_role: "project_orientation"
  state_role: "operational_working_state"
  conversations_role: "append_only_session_history"  # tracked continuity contract input; public policies may route raw transcripts elsewhere
  knowledge_role: "durable_synthesis"
  tasks_role: "execution_artifacts"
  artifacts_role: "deliverables"

status:
  phase: "planning"  # planning/active/paused/completed
  last_updated: "YYYY-MM-DD"
  next_action: "Define project goals"

execution:
  source_repo_roots:
    - "."  # Required for git_versioned and legacy github_versioned projects. Relative to the managed project root.

archive_import_policy:
  active_source_allowlist: []
  provenance_only_allowlist: []
  reject_list: []

tech:
  languages: []
  platforms: []
  tools: []
