version: 1
status: active
purpose: >
  Classify tracked entries under projects/ so runtime extraction can proceed without
  re-opening host-product versus runtime boundary questions.

canonical_host_project:
  path: projects/agenticos
  classification: host_product
  note: AgenticOS product source project after the landed self-hosting migration.

tracked_projects:
  - path: projects/2026okr
    classification: runtime_project
    extraction_priority: high
    note: Real managed project content and historical working material.
    execution_status: extracted_to_live_workspace
    live_workspace_path: /Users/jeking/AgenticOS/projects/2026okr
    execution_note: First safe-wave extraction completed on 2026-03-23.

  - path: projects/360teams
    classification: runtime_project
    extraction_priority: high
    note: Real managed project with its own repository, dependencies, coverage, and runtime byproducts.
    execution_status: extracted_to_live_workspace
    live_workspace_path: /Users/jeking/AgenticOS/projects/360teams
    execution_note: First safe-wave extraction completed on 2026-03-23.

  - path: projects/agentic-devops
    classification: runtime_project
    extraction_priority: high
    note: Real managed project, not part of AgenticOS product source.
    execution_status: extracted_to_live_workspace
    live_workspace_path: /Users/jeking/AgenticOS/projects/agentic-devops
    execution_note: Wave 2 combined the external project tree with the source metadata shadow into AGENTICOS_HOME.

  - path: projects/ghostty-optimization
    classification: runtime_project
    extraction_priority: high
    note: Real managed project, not part of AgenticOS product source.
    execution_status: extracted_to_live_workspace
    live_workspace_path: /Users/jeking/AgenticOS/projects/ghostty-optimization
    execution_note: Wave 2 copied the external standalone repository into AGENTICOS_HOME and overlaid source-only shadow artifacts without overwriting the external canonical files.

  - path: projects/test-project
    classification: fixture_example
    extraction_priority: low
    note: Minimal initialization artifact created to verify agenticos_init behavior; may remain as fixture or be regenerated later.
    execution_status: unchanged

removed_orphaned_residues:
  - path: projects/okr-management
    previous_classification: runtime_project
    resolution_status: removed_from_source_repo
    resolution_note: >
      Removed by issue #56 after verification showed the path was only an orphaned
      gitlink residue with no valid .gitmodules mapping and no canonical content source.

  - path: projects/t5t
    previous_classification: runtime_project
    resolution_status: removed_from_source_repo
    resolution_note: >
      Removed by issue #56 after verification showed the path was only an orphaned
      gitlink residue with no valid .gitmodules mapping and no canonical content source.

root_scoped_exclusions:
  - .github/
  - .runtime/
  - .claude/worktrees/

decision_rules:
  - Only projects/agenticos is canonical product source.
  - Non-agenticos tracked entries under projects/ default to runtime or fixture content, not product source.
  - Runtime projects should be extracted before relying on the source repo as a clean reference checkout.
  - Orphaned gitlink residues without valid mappings or canonical content should be removed rather than treated as runtime projects.
