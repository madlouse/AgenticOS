version: 1
kit_id: downstream-standard-kit
kit_version: 0.2.0
status: active
purpose: >
  Package the executable AgenticOS workflow standard for downstream projects.

layers:
  generated_files:
    description: Files generated or upgraded by the distillation layer.
    entries:
      - path: AGENTS.md
        canonical_source: projects/agenticos/mcp-server/src/utils/distill.ts
        inheritance: generated
        customizable: limited
      - path: CLAUDE.md
        canonical_source: projects/agenticos/mcp-server/src/utils/distill.ts
        inheritance: generated
        customizable: limited

  copied_templates:
    description: Files copied into a downstream project and then edited in-project.
    entries:
      - path: .project.yaml
        canonical_source: projects/agenticos/.meta/templates/.project.yaml
        inheritance: copied_template
        customizable: yes
      - path: .context/quick-start.md
        canonical_source: projects/agenticos/.meta/templates/quick-start.md
        inheritance: copied_template
        customizable: yes
      - path: .context/state.yaml
        canonical_source: projects/agenticos/.meta/templates/state.yaml
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/agent-preflight-checklist.yaml
        canonical_source: projects/agenticos/.meta/templates/agent-preflight-checklist.yaml
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/issue-design-brief.md
        canonical_source: projects/agenticos/.meta/templates/issue-design-brief.md
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/non-code-evaluation-rubric.yaml
        canonical_source: projects/agenticos/.meta/templates/non-code-evaluation-rubric.yaml
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/sub-agent-handoff.md
        canonical_source: projects/agenticos/.meta/templates/sub-agent-handoff.md
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/global-review-log.md
        canonical_source: projects/agenticos/.meta/templates/global-review-log.md
        inheritance: copied_template
        customizable: yes
      - path: tasks/templates/submission-evidence.md
        canonical_source: projects/agenticos/.meta/templates/submission-evidence.md
        inheritance: copied_template
        customizable: yes

  excluded_root_infra:
    description: Root-scoped repository infrastructure that downstream projects must not inherit as project-scoped standards.
    entries:
      - path: .github/
        reason: repository_root_infrastructure
      - path: .runtime/
        reason: local_runtime_state
      - path: .claude/worktrees/
        reason: local_runtime_state

  downstream_doc_standards:
    description: Documentation quality standards that downstream projects are encouraged to adopt.
    entries:
      - id: agent-friendly-readme
        spec_version: "1.0"
        spec_file: standards/knowledge/agent-friendly-readme-spec-v1.md
        research_file: standards/knowledge/agent-friendly-readme-research-2026-04-02.md
        scope:
          - README.md
          - install.md
          - CONTRIBUTING.md
        validation_tool: .github/workflows/readme-lint.yml
        lint_script: scripts/readme-lint.sh
        inheritance: recommended
        severity_summary:
          errors_block_merge:
            - AFR-001  # heading hierarchy
            - AFR-002  # installation disambiguation
          warnings_fix_recommended:
            - AFR-003  # code fence language
            - AFR-004  # tool name consistency
            - AFR-005  # semantic warning markers
            - AFR-007  # link integrity
            - AFR-008  # single source of truth
          recommendations_noted:
            - AFR-006  # AI execution entry
            - AFR-009  # llms.txt existence
          informational:
            - AFR-010  # README length

upgrade_rules:
  template_marker_version:
    AGENTS.md: 7
    CLAUDE.md: 7
  compatibility_rule: >
    Generated files may be upgraded in place by distill when the template marker version changes.
  copied_template_rule: >
    Copied templates are project-owned after adoption. Upgrades should be opt-in and compare against canonical sources.

adoption:
  required_files:
    - AGENTS.md
    - CLAUDE.md
    - .project.yaml
    - .context/quick-start.md
    - .context/state.yaml
    - tasks/templates/agent-preflight-checklist.yaml
    - tasks/templates/issue-design-brief.md
    - tasks/templates/non-code-evaluation-rubric.yaml
    - tasks/templates/sub-agent-handoff.md
    - tasks/templates/submission-evidence.md
  required_behavior:
    - operator_intent_resolution
    - memory_layer_contracts
    - cross_agent_policy_contract
    - implementation_preflight
    - issue_first_branching
    - isolated_worktree_execution
    - edit_boundary_enforcement
    - pr_scope_validation
    - official_agent_adapter_surfaces
    - sub_agent_context_inheritance
